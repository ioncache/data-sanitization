version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 1-7 * 1"
      timezone: "America/Toronto"

    open-pull-requests-limit: 3

    commit-message:
      prefix: "chore"
      include: "scope"

    groups:
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "eslint-*"
        update-types:
          - "minor"
          - "patch"

      test-tooling:
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - "minor"
          - "patch"

      formatting:
        patterns:
          - "prettier"
        update-types:
          - "minor"
          - "patch"

      npm-prod-minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

      npm-dev-minor-and-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 1-7 * 1"
      timezone: "America/Toronto"

    open-pull-requests-limit: 2

    commit-message:
      prefix: "ci"
      include: "scope"

    groups:
      github-actions:
        patterns:
          - "*"
